<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>cpMan — Slide 01 Hero</title>
  <link rel="stylesheet" href="../slide-base.css">
</head>
<body>
  <div class="slide">
    <div class="brand">
      <img src="../../../../Sources/cpMan/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" alt="cpMan">
      <span>cpMan</span>
    </div>
    <div class="copy">
      <h1 class="headline">Clipboard history.<br>One shortcut away.</h1>
      <p class="subhead">Press ^⌥V anywhere on your Mac. Browse, search, and paste anything you copied — text or images.</p>
      <span class="badge">Menu bar · Private · No account</span>
    </div>
    <div class="visual">
      <div class="frame">
        <img src="../../raw/01-picker.png" alt="Picker" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',innerHTML:'Drop <code>raw/01-picker.png</code><br>Demo picker, all clips'}))">
      </div>
    </div>
  </div>
</body>
</html>
