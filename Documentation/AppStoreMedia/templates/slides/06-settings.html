<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>cpMan — Slide 06 Settings</title>
  <link rel="stylesheet" href="../slide-base.css">
</head>
<body>
  <div class="slide reverse">
    <div class="brand">
      <img src="../../../../Sources/cpMan/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" alt="cpMan">
      <span>cpMan</span>
    </div>
    <div class="copy">
      <h1 class="headline">Your rules.<br>Your history.</h1>
      <p class="subhead">Set history limits, customize your hotkey, and tune image storage. Simple settings, full control.</p>
      <span class="badge">History limits · Hotkeys · Images</span>
    </div>
    <div class="visual">
      <div class="frame">
        <img src="../../raw/06-settings.png" alt="Settings" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',innerHTML:'Drop <code>raw/06-settings.png</code><br>Settings window'}))">
      </div>
    </div>
  </div>
</body>
</html>
