<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>cpMan — Slide 03 Images</title>
  <link rel="stylesheet" href="../slide-base.css">
</head>
<body>
  <div class="slide">
    <div class="brand">
      <img src="../../../../Sources/cpMan/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" alt="cpMan">
      <span>cpMan</span>
    </div>
    <div class="copy">
      <h1 class="headline">Text and images.<br>Searchable.</h1>
      <p class="subhead">Screenshots and copied images stay in your history. OCR extracts text on your Mac — nothing is sent to the cloud.</p>
      <span class="badge">Image history · On-device Vision OCR</span>
    </div>
    <div class="visual">
      <div class="frame">
        <img src="../../raw/03-images.png" alt="Images" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',innerHTML:'Drop <code>raw/03-images.png</code><br>Image row in picker'}))">
      </div>
    </div>
  </div>
</body>
</html>
