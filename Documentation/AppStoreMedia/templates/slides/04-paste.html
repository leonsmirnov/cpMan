<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>cpMan — Slide 04 Paste</title>
  <link rel="stylesheet" href="../slide-base.css">
</head>
<body>
  <div class="slide reverse">
    <div class="brand">
      <img src="../../../../Sources/cpMan/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" alt="cpMan">
      <span>cpMan</span>
    </div>
    <div class="copy">
      <h1 class="headline">Paste in one<br>keystroke.</h1>
      <p class="subhead">Select a clip and cpMan pastes it into your active app. Turn auto-paste on or copy-only — your choice in Settings.</p>
      <span class="badge">Auto-paste · Return to select</span>
    </div>
    <div class="visual">
      <div class="frame">
        <img src="../../raw/04-paste.png" alt="Paste" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',innerHTML:'Drop <code>raw/04-paste.png</code><br>Picker + Notes/TextEdit'}))">
      </div>
    </div>
  </div>
</body>
</html>
