<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>cpMan — Slide 02 Search</title>
  <link rel="stylesheet" href="../slide-base.css">
</head>
<body>
  <div class="slide reverse">
    <div class="brand">
      <img src="../../../../Sources/cpMan/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" alt="cpMan">
      <span>cpMan</span>
    </div>
    <div class="copy">
      <h1 class="headline">Find anything<br>instantly.</h1>
      <p class="subhead">Type to filter your history as you go. URLs, code, notes — and text inside images thanks to on-device OCR.</p>
      <span class="badge">Search · OCR · ⌘1–9 quick pick</span>
    </div>
    <div class="visual">
      <div class="frame">
        <img src="../../raw/02-search.png" alt="Search" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',innerHTML:'Drop <code>raw/02-search.png</code><br>Picker with search filter'}))">
      </div>
    </div>
  </div>
</body>
</html>
