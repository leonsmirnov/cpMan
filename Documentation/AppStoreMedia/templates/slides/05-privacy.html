<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>cpMan — Slide 05 Privacy</title>
  <link rel="stylesheet" href="../slide-base.css">
</head>
<body>
  <div class="slide">
    <div class="brand">
      <img src="../../../../Sources/cpMan/Resources/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" alt="cpMan">
      <span>cpMan</span>
    </div>
    <div class="copy">
      <h1 class="headline">Stay private.<br>Stay in control.</h1>
      <p class="subhead">Pause recording with Private Mode. Ignore password managers. Pin what matters. Everything stays on your Mac.</p>
      <span class="badge">Private Mode · Ignore list · Pin</span>
    </div>
    <div class="visual">
      <div class="frame">
        <img src="../../raw/05-menu.png" alt="Menu" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',innerHTML:'Drop <code>raw/05-menu.png</code><br>Menu bar → Private Mode'}))">
      </div>
    </div>
  </div>
</body>
</html>
