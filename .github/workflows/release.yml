name: Release

# Triggers when you push a version tag like v1.0.0, or manually from GitHub UI
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the DMG (e.g. v1.0.0-test)"
        required: true
        default: "v0.0.0-manual"

jobs:
  build-and-release:
    name: Build DMG & Publish Release
    runs-on: macos-15
    # Opt into the Node 24 JS Actions runtime; avoids deprecated Node 20 for
    # third-party actions until they all ship Node 24-native versions.
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -project cpMan.xcodeproj -resolvePackageDependencies -scheme cpMan

      - name: Build Release
        run: |
          set -o pipefail
          xcodebuild build \
            -project cpMan.xcodeproj \
            -scheme cpMan \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Locate built app
        id: app_path
        run: |
          APP=$(find build/DerivedData -name "cpMan.app" -maxdepth 6 | head -1)
          echo "path=$APP" >> $GITHUB_OUTPUT
          echo "Found app at: $APP"

      - name: Resolve version label
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "label=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "label=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "cpMan" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "cpMan.app" 150 185 \
            --hide-extension "cpMan.app" \
            --app-drop-link 450 185 \
            "dist/cpMan-${{ steps.version.outputs.label }}.dmg" \
            "${{ steps.app_path.outputs.path }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.label }}
          name: "cpMan ${{ steps.version.outputs.label }}"
          body: |
            ## cpMan ${{ steps.version.outputs.label }}

            ### Install
            1. Download `cpMan-${{ steps.version.outputs.label }}.dmg`
            2. Open the DMG and drag **cpMan.app** to your Applications folder
            3. Launch cpMan and grant Accessibility access when prompted

            > **Note:** This build is ad-hoc signed (not notarized).
            > If macOS blocks the app, right-click → Open to bypass Gatekeeper.
          files: dist/cpMan-${{ steps.version.outputs.label }}.dmg
          draft: false
          prerelease: ${{ contains(steps.version.outputs.label, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to Google Drive
        # Google Drive is a mirror; the GitHub Release above is the primary
        # distribution path and should not be blocked by Drive API/config issues.
        continue-on-error: true
        run: |
          # macos-15 ships an externally-managed system Python (PEP 668), so use a
          # disposable venv instead of pip-installing into the system interpreter.
          python3 -m venv .venv-gdrive
          source .venv-gdrive/bin/activate
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet google-api-python-client google-auth
          python << 'EOF'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds_info = json.loads(os.environ['GDRIVE_CREDENTIALS'])
          folder_id  = os.environ['GDRIVE_FOLDER_ID']
          version    = os.environ['VERSION_LABEL']
          dmg_path   = f"dist/cpMan-{version}.dmg"

          creds = service_account.Credentials.from_service_account_info(
              creds_info,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)

          file_metadata = {
              'name': f"cpMan-{version}.dmg",
              'parents': [folder_id]
          }
          media = MediaFileUpload(dmg_path, mimetype='application/octet-stream', resumable=True)
          f = service.files().create(body=file_metadata, media_body=media, fields='id').execute()
          print(f"✅ Uploaded to Google Drive — file ID: {f.get('id')}")
          EOF
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          VERSION_LABEL: ${{ steps.version.outputs.label }}
