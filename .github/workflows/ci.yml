name: CI

# Runs on integration branches + every PR targeting them + manual "Run workflow".
# (Previously `branches: ["**"]` ran on every push to every branch — noisy and costly.)
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -project cpMan.xcodeproj -resolvePackageDependencies -scheme cpMan

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme cpMan \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit ${PIPESTATUS[0]}

      - name: Install xcpretty (if missing)
        if: failure()
        run: gem install xcpretty && echo "Re-run the workflow"
