name: CI

# Runs on integration branches + every PR targeting them + manual "Run workflow".
# (Previously `branches: ["**"]` ran on every push to every branch — noisy and costly.)
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      # Advisory for now: surfaces violations in the logs without failing the
      # build. The existing tree has intentional exceptions (e.g. the force-try
      # in HistoryStore's migration fallback). Flip `continue-on-error` to false
      # once the backlog is burned down to make lint a hard gate.
      - name: Run SwiftLint
        continue-on-error: true
        run: swiftlint lint --reporter github-actions-logging

  test:
    name: Build & Test
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -project cpMan.xcodeproj -resolvePackageDependencies -scheme cpMan

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme cpMan \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit ${PIPESTATUS[0]}

      - name: Install xcpretty (if missing)
        if: failure()
        run: gem install xcpretty && echo "Re-run the workflow"
